<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеєр для лекції</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* Базові стилі під кольори теми Telegram студента */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
        }

        h2 {
            margin-top: 0;
            font-size: 22px;
        }

        /* МАГІЯ ПЛЕЄРА: Контейнер, який робить відео адаптивним */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Це пропорція 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 12px; /* Стильні закруглені кути */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Легка тінь */
            background-color: #000; /* Чорний фон, поки відео вантажиться */
        }

        /* Саме відео розтягується на весь контейнер */
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h2>Крок 1: Кардіологія 🫀</h2>

    <div class="video-container">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/Ny3uzxYABUg?si=KtC8EAUcqrYvZYIr" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>

    <script>
        // Команда для Telegram: розгорнути вікно на максимум
        let tg = window.Telegram.WebApp;
        tg.expand();
    </script>

</body>
</html>
